    post:
      operationId: agentCreateSuppression
      tags: [agent]
      summary: Add to suppression list (agent)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SuppressionInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
