  /agent/runs:
    post:
      operationId: agentCreateRun
      tags: [agent]
      summary: Create agent run log (agent)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AgentRunInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentRun"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required: [error]

    SuccessResponse:
      type: object
      properties:
        ok:
          type: boolean
      required: [ok]

    LoginInput:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
        password:
          type: string

    AuthUser:
      type: object
      required: [id, username]
      properties:
        id:
          type: integer
        username:
          type: string

    DashboardStats:
      type: object
      required: [totalLeads, byStatus, byBusinessType, byCity, recentEvents, responseRate]
      properties:
        totalLeads:
          type: integer
        byStatus:
          type: array
          items:
            $ref: "#/components/schemas/CountGroup"
        byBusinessType:
          type: array
          items:
            $ref: "#/components/schemas/CountGroup"
        byCity:
          type: array
          items:
            $ref: "#/components/schemas/CountGroup"
        recentEvents:
          type: array
          items:
            $ref: "#/components/schemas/OutreachEvent"
        responseRate:
          type: number
        pendingTasks:
          type: integer

    CountGroup:
      type: object
      required: [label, count]
      properties:
        label:
          type: string
        count:
          type: integer

    Lead:
      type: object
      required: [id, businessName, createdAt, updatedAt]
      properties:
        id:
          type: integer
        businessName:
          type: string
        businessType:
          type: ["string", "null"]
        city:
          type: ["string", "null"]
        province:
          type: ["string", "null"]
        country:
          type: ["string", "null"]
        website:
          type: ["string", "null"]
        email:
          type: ["string", "null"]
        phone:
          type: ["string", "null"]
        instagram:
          type: ["string", "null"]
        sourceUrl:
          type: ["string", "null"]
        sourceNotes:
          type: ["string", "null"]
        fitScore:
          type: ["integer", "null"]
        fitReason:
          type: ["string", "null"]
        consentStatus:
          type: ["string", "null"]
        crmStatus:
          type: ["string", "null"]
        priority:
          type: ["string", "null"]
        assignedTo:
          type: ["string", "null"]
        lastContactedAt:
          type: ["string", "null"]
        nextActionAt:
          type: ["string", "null"]
        createdAt:
          type: string
        updatedAt:
          type: string

    LeadDetail:
