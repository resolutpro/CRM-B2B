                  $ref: "#/components/schemas/Setting"

  /agent-runs:
    get:
      operationId: getAgentRuns
      tags: [agentRuns]
      summary: List agent runs
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of agent runs
          content:
            application/json:
              schema:
                type: array
                items:
