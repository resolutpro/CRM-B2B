              schema:
                $ref: "#/components/schemas/AgentConfig"

  /agent/leads/upsert:
    post:
      operationId: agentUpsertLead
      tags: [agent]
      summary: Create or update a lead (upsert)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LeadInput"
      responses:
        "200":
          description: Upserted lead
